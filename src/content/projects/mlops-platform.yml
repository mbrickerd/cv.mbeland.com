title: AWS ML Platform — Repayment Prediction at Scale
experienceId: eraneos-ml-engineer
employer: Eraneos
client: Tinka (Wehkamp)
sector: Financial Services
duration: 01/2021 to 09/2021
role: Machine Learning Engineer

printSummary: >
  Built a production-grade MLOps platform on AWS SageMaker for two repayment prediction
  models, with CI/CD via CodeBuild/CodeCommit and automated training, deployment, and
  monitoring pipelines from scratch.

onlineSummary: >
  Tinka needed to deploy production ML models predicting repayment likelihood but had
  no ML infrastructure or deployment framework in place. Built a complete AWS MLOps
  platform — feature engineering pipelines on SageMaker and S3, automated CI/CD via
  CodeBuild and CodeCommit, and model monitoring with Clarify — for two distinct customer
  segments, designed as a reusable pattern for future engagements.

details:
  - "Situation: Tinka needed to deploy two customer-segment ML models predicting repayment likelihood for the 'pay later' checkout option on Wehkamp, a major Dutch e-commerce platform, but had no existing ML infrastructure or deployment framework."
  - "Task: Implement a production-grade, automated MLOps pipeline on AWS SageMaker from scratch that could support both models and serve as a reusable pattern for future work."
  - "Action: Used SageMaker Data Wrangler for feature engineering and data preparation, persisting processed datasets to S3; built SageMaker Pipelines for automated end-to-end model training and deployment; implemented CI/CD via AWS CodeBuild and CodeCommit to automate pipeline execution on code changes; integrated SageMaker Clarify for model monitoring, bias detection, and drift alerting across both customer segments."
  - "Result: Delivered a scalable, fully automated ML platform supporting two production models with end-to-end CI/CD, reduced manual intervention in the model lifecycle, and established a reusable infrastructure pattern applied to subsequent client engagements."

