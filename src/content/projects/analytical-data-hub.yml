printSummary: >
  Designed a Cloud Composer and dbt orchestration framework for the Analytics Data Hub
  and led migration of the Sales Order domain into governed BigQuery dbt models.

onlineSummary: >
  Rituals' Analytical Data Hub had no consistent orchestration layer, no data lineage,
  and its most-used reporting domain was fragmented across siloed teams. Designed a
  modular orchestration and CI/CD-driven infrastructure pattern, migrated the Sales Order
  domain into a governed dbt layer in BigQuery with full column-level lineage, and
  established pipeline monitoring and data contracts as the platform standard.

details:
  - "Situation: The ADH lacked a scalable orchestration layer — workflows were managed ad hoc across siloed teams, causing frequent deployment conflicts, duplicated logic, and inconsistent data outputs that eroded trust in reporting."
  - "Task: Design and implement a reusable, modular orchestration framework and migrate the most widely used reporting domain into the new platform."
  - "Action: Architected a Cloud Composer and dbt orchestration layer following medallion architecture principles using Cloud Run for compute; provisioned infrastructure via Terraform workspaces as a CI/CD-driven IaC pattern enabling isolated, conflict-free team development; migrated Sales Order domain logic into standardised BigQuery dbt models with full column-level lineage and documentation from raw sys-layer through to curated silver-layer; established data contracts and pipeline monitoring via Cloud Composer, aligning data definitions with business stakeholders."
  - "Result: Reduced deployment conflicts across teams, established a reusable pipeline pattern with built-in lineage and governance that accelerated onboarding of new data domains, and delivered a governed Sales Order domain that became the single source of truth for cross-team analytics."

