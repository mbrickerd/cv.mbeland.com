printSummary: >
  Upgraded a fraudulent retailer detection ML model and introduced a structured
  MLflow-based retraining and monitoring framework.

onlineSummary: >
  An ageing fraud detection model was producing declining recall with no systematic
  retraining process or pipeline observability in place. Rebuilt the production feature
  engineering pipeline, improved model architecture, and introduced automated retraining,
  drift monitoring, and alerting — bringing the full model lifecycle under engineering
  control and eliminating ad-hoc intervention.

details:
  - "Situation: The existing classification model for fraudulent retailer detection had degrading recall due to evolving fraud patterns and no systematic retraining process, increasing financial and reputational risk across the marketplace."
  - "Task: Rebuild the model pipeline with improved features and establish a production-grade retraining and monitoring cadence to make the model self-sustaining."
  - "Action: Refactored the feature engineering pipeline to incorporate richer behavioural signals and improve data quality and signal coverage; benchmarked and selected an improved model architecture; implemented MLflow for experiment tracking, model versioning, and automated drift monitoring with alerting — establishing a fully observable, production-grade model lifecycle with structured retraining triggers."
  - "Result: Improved recall on held-out validation data and introduced a structured retraining cadence with drift alerting that eliminated the need for ad-hoc manual model updates, reducing operational overhead and improving marketplace risk coverage."

